<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Buscar</title></head>
<body>

<div th:replace="~{layout/main :: layout('Buscar', ~{:: #page-content}, ${blockTree})}">
    <div id="page-content">

        <div class="mb-8">
            <h1 class="text-2xl font-bold text-slate-900 mb-2 dark:text-slate-100">
                Resultados para "<span th:text="${keyword}"></span>"
            </h1>
            <p class="text-slate-600 dark:text-slate-400">
                <span th:text="${#lists.size(results)}">0</span> resultado(s) encontrado(s)
            </p>
        </div>

        <div th:if="${#lists.isEmpty(results)}" class="bg-white rounded-lg shadow-sm border border-slate-200 p-8 text-center dark:bg-slate-900 dark:border-slate-700">
            <p class="text-slate-500 dark:text-slate-400">No se encontraron conceptos que coincidan con tu búsqueda.</p>
        </div>

        <div class="grid gap-4 md:grid-cols-2" th:if="${!#lists.isEmpty(results)}">
            <a th:each="r : ${results}"
               th:href="${r.isConcept()} ? @{/concept/{slug}(slug=${r.slug})} : @{/subconcept/{slug}(slug=${r.slug})}"
               class="bg-white rounded-lg shadow-sm border border-slate-200 p-5 hover:border-blue-400 hover:shadow-md transition group dark:bg-slate-900 dark:border-slate-700 dark:hover:border-blue-500">
                <h3 class="font-semibold text-slate-900 group-hover:text-blue-600 transition dark:text-slate-100 dark:group-hover:text-blue-400"
                    th:text="${r.title}">Resultado</h3>
                <p class="text-xs text-slate-500 mt-1 dark:text-slate-400">
                    <span th:if="${r.isConcept()}" class="bg-blue-100 text-blue-700 px-2 py-0.5 rounded-full dark:bg-blue-900/30 dark:text-blue-300">Concepto</span>
                    <span th:if="${r.isSubConcept()}" class="bg-slate-100 text-slate-600 px-2 py-0.5 rounded-full dark:bg-slate-700 dark:text-slate-300">Tema de <span th:text="${r.conceptTitle}"></span></span>
                </p>
            </a>
        </div>

    </div>
</div>

</body>
</html>
