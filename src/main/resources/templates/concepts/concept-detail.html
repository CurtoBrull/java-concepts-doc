<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title th:text="${concept.title}">Concepto</title></head>
<body>

<div th:replace="~{layout/main :: layout(${concept.title}, ~{:: #page-content}, ${blockTree})}">
    <div id="page-content">

        <div class="mb-6">
            <a href="/map" class="text-blue-600 hover:underline text-sm flex items-center gap-1">
                <span>←</span> Volver al mapa
            </a>
        </div>

        <!-- Header -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-8 mb-8 dark:bg-slate-900 dark:border-slate-700 transition-colors">
            <div class="flex items-center gap-3 mb-4">
                <span class="text-xs font-bold uppercase text-blue-600 bg-blue-50 px-2 py-1 rounded dark:text-blue-400 dark:bg-blue-900/30"
                      th:text="${concept.block.replace('_', ' ')}">Bloque</span>
            </div>
            <h1 class="text-3xl font-bold text-slate-900 dark:text-slate-100" th:text="${concept.title}">Concepto</h1>
        </div>

        <!-- Descripción general del concepto -->
        <div th:if="${concept.description != null and !concept.description.isBlank()}"
             class="bg-white rounded-xl shadow-sm border border-slate-200 p-8 mb-8 dark:bg-slate-900 dark:border-slate-700 transition-colors">
            <h2 class="text-xl font-semibold text-slate-800 mb-4 dark:text-slate-100">¿Qué es?</h2>
            <div class="prose max-w-none text-slate-700 leading-relaxed dark:text-slate-300"
                 th:text="${concept.description}">Descripción general</div>

            <!-- Código de ejemplo a nivel concepto -->
            <div th:if="${concept.codeExample != null and !concept.codeExample.isBlank()}"
                 class="mt-6">
                <h3 class="text-lg font-medium text-slate-700 mb-3 dark:text-slate-300">Ejemplo</h3>
                <pre class="bg-slate-900 text-slate-100 rounded-lg p-4 overflow-x-auto text-sm"><code
                        th:text="${concept.codeExample}">code</code></pre>
            </div>
        </div>

        <!-- Preguntas de entrevista del concepto -->
        <div th:if="${!concept.questions.isEmpty()}"
             class="bg-white rounded-xl shadow-sm border border-slate-200 p-8 mb-8 dark:bg-slate-900 dark:border-slate-700 transition-colors">
            <h2 class="text-xl font-semibold text-slate-800 mb-4 dark:text-slate-100">Preguntas de Entrevista</h2>
            <div class="space-y-4">
                <div th:each="q : ${concept.questions}" class="border border-slate-200 rounded-lg overflow-hidden dark:border-slate-700">
                    <button type="button"
                            class="w-full text-left px-5 py-4 bg-slate-50 hover:bg-slate-100 transition flex items-center justify-between font-medium text-slate-900 dark:bg-slate-800 dark:hover:bg-slate-700 dark:text-slate-100"
                            onclick="this.nextElementSibling.classList.toggle('hidden'); this.querySelector('.arrow').classList.toggle('rotate-90');">
                        <span th:text="${q.question}">Pregunta</span>
                        <span class="arrow transition-transform duration-200">▼</span>
                    </button>
                    <div class="hidden px-5 py-4 bg-white text-slate-700 leading-relaxed border-t border-slate-200 dark:bg-slate-900 dark:text-slate-300 dark:border-slate-700">
                        <span th:text="${q.answer}">Respuesta</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Lista de subconceptos -->
        <h2 class="text-xl font-semibold text-slate-800 mb-4 dark:text-slate-100">Temas</h2>

        <div class="grid gap-4 md:grid-cols-2" th:if="${!concept.subConcepts.isEmpty()}">
            <a th:each="sub : ${concept.subConcepts}"
               th:href="@{/subconcept/{slug}(slug=${sub.slug})}"
               class="bg-white rounded-lg shadow-sm border border-slate-200 p-5 hover:border-blue-400 hover:shadow-md transition group dark:bg-slate-900 dark:border-slate-700 dark:hover:border-blue-500">
                <h3 class="font-semibold text-slate-900 group-hover:text-blue-600 transition flex items-center justify-between dark:text-slate-100 dark:group-hover:text-blue-400">
                    <span th:text="${sub.title}">Subconcepto</span>
                    <span class="text-slate-300 group-hover:text-blue-400 transition dark:text-slate-600">→</span>
                </h3>
            </a>
        </div>

        <div th:if="${concept.subConcepts.isEmpty()}" class="bg-amber-50 border border-amber-200 rounded-lg p-6 dark:bg-amber-900/20 dark:border-amber-800">
            <p class="text-amber-800 dark:text-amber-200">Contenido en desarrollo. Próximamente disponible.</p>
        </div>

    </div>
</div>

</body>
</html>
