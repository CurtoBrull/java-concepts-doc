<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Mapa de Conceptos</title></head>
<body>

<div th:replace="~{layout/main :: layout('Mapa de Conceptos', ~{:: #page-content}, ${blockTree})}">
    <div id="page-content">

        <div class="mb-8">
            <h1 class="text-3xl font-bold text-slate-900 mb-2">Mapa de Conceptos</h1>
            <p class="text-slate-600">Navega por todos los conceptos de Java, Spring y herramientas de desarrollo.</p>
        </div>

        <div class="space-y-8">
            <div th:each="blockDto : ${blockTree}" class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
                <h2 class="text-xl font-bold text-slate-800 mb-4 pb-2 border-b border-slate-200 flex items-center gap-2">
                    <span class="w-3 h-3 rounded-full bg-blue-500"></span>
                    <span th:text="${blockDto.block.name().replace('_', ' ')}">Bloque</span>
                </h2>

                <div class="grid gap-4 md:grid-cols-2 lg:grid-cols-3">
                    <div th:each="concept : ${blockDto.concepts}"
                         class="bg-slate-50 rounded-lg p-4 border border-slate-100 hover:border-blue-300 transition">
                        <h3 class="font-semibold text-slate-900 mb-2">
                            <a th:href="@{/concept/{slug}(slug=${concept.slug})}"
                               class="hover:text-blue-600 transition"
                               th:text="${concept.title}">Concepto</a>
                        </h3>
                        <ul class="space-y-1" th:if="${!concept.subConcepts.isEmpty()}">
                            <li th:each="sub : ${concept.subConcepts}">
                                <a th:href="@{/subconcept/{slug}(slug=${sub.slug})}"
                                   class="text-sm text-slate-600 hover:text-blue-600 transition flex items-center gap-1">
                                    <span class="text-slate-400">→</span>
                                    <span th:text="${sub.title}">Subconcepto</span>
                                </a>
                            </li>
                        </ul>
                        <p th:if="${concept.subConcepts.isEmpty()}" class="text-xs text-slate-400 italic">Próximamente</p>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>

</body>
</html>
