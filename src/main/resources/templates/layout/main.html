<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout(title, content, blockTree)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' · Java Concepts'">Java Concepts</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <script>
        tailwind.config = {
            darkMode: 'class'
        };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/java.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex dark:bg-slate-950 dark:text-slate-200 transition-colors">

    <!-- Sidebar -->
    <aside class="w-72 bg-slate-900 text-white flex-shrink-0 overflow-y-auto fixed h-full sidebar">
        <div class="p-4 border-b border-slate-700 flex items-center justify-between">
            <a href="/map" class="text-xl font-bold tracking-tight block">☕ Java Concepts</a>
            <button type="button" id="theme-toggle" class="text-slate-400 hover:text-white transition" aria-label="Cambiar tema">
                <svg id="theme-icon-sun" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
                </svg>
                <svg id="theme-icon-moon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
                </svg>
            </button>
        </div>

        <nav class="p-4 space-y-2">
            <!-- Search -->
            <form action="/search" method="get" class="relative">
                <input type="text" name="q" placeholder="Buscar..."
                       class="w-full px-3 py-2 rounded-md text-sm bg-slate-800 border border-slate-700 focus:outline-none focus:border-blue-500 text-white placeholder-slate-400"
                       th:value="${keyword}"/>
            </form>

            <div class="flex justify-end gap-2 text-xs">
                <button type="button" id="expand-all" class="text-slate-400 hover:text-white">Expandir todo</button>
                <span class="text-slate-600">|</span>
                <button type="button" id="collapse-all" class="text-slate-400 hover:text-white">Colapsar todo</button>
            </div>

            <!-- Block groups -->
            <div th:each="blockDto : ${blockTree}" class="block-group" th:data-block="${blockDto.block.name()}">
                <button type="button" class="block-toggle w-full flex items-center justify-between px-2 py-1.5 text-xs font-bold uppercase text-slate-400 tracking-wider hover:text-white hover:bg-slate-800 rounded-md transition">
                    <span th:text="${blockDto.block.name().replace('_', ' ')}">Bloque</span>
                    <svg class="chevron w-4 h-4 transform transition-transform duration-200" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                    </svg>
                </button>
                <div class="block-content hidden mt-1">
                    <ul class="space-y-0.5">
                        <li th:each="concept : ${blockDto.concepts}">
                            <a th:href="@{/concept/{slug}(slug=${concept.slug})}"
                               class="sidebar-link block px-3 py-1.5 text-sm rounded-md hover:bg-slate-800 transition text-slate-200 font-medium"
                               th:classappend="${concept.subConcepts.isEmpty()} ? 'opacity-50 cursor-default' : ''"
                               th:text="${concept.title}">Concepto</a>
                            <ul class="ml-4 border-l border-slate-700 pl-2 space-y-0.5" th:if="${!concept.subConcepts.isEmpty()}">
                                <li th:each="sub : ${concept.subConcepts}">
                                    <a th:href="@{/subconcept/{slug}(slug=${sub.slug})}"
                                       class="sidebar-link block px-3 py-1 text-sm rounded-md hover:bg-slate-800 transition text-slate-400 hover:text-white"
                                       th:text="${sub.title}">Subconcepto</a>
                                </li>
                            </ul>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </aside>

    <!-- Main content -->
    <main class="flex-1 ml-72 p-8 pb-24 overflow-y-auto bg-slate-50 dark:bg-slate-950 transition-colors" th:insert="${content}"></main>

    <footer class="fixed bottom-0 left-72 right-0 bg-white border-t border-slate-200 py-3 px-8 text-center text-sm text-slate-500 dark:bg-slate-900 dark:border-slate-700 dark:text-slate-400 transition-colors">
        Java Concepts Doc · Aprende Java, Spring y Spring Boot para entrevistas de trabajo
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            hljs.highlightAll();

            // Botón copiar en bloques de código
            document.querySelectorAll('pre code').forEach(codeBlock => {
                const pre = codeBlock.parentElement;
                pre.classList.add('relative', 'group');

                const button = document.createElement('button');
                button.type = 'button';
                button.className = 'copy-btn absolute top-2 right-2 px-2 py-1 text-xs font-medium text-slate-300 bg-slate-800/80 hover:bg-slate-700 rounded opacity-0 group-hover:opacity-100 transition focus:opacity-100';
                button.textContent = 'Copiar';
                button.setAttribute('aria-label', 'Copiar código');

                button.addEventListener('click', () => {
                    const text = codeBlock.textContent || '';
                    navigator.clipboard.writeText(text).then(() => {
                        button.textContent = '¡Copiado!';
                        button.classList.add('text-green-400');
                        setTimeout(() => {
                            button.textContent = 'Copiar';
                            button.classList.remove('text-green-400');
                        }, 1500);
                    }).catch(() => {
                        button.textContent = 'Error';
                        setTimeout(() => button.textContent = 'Copiar', 1500);
                    });
                });

                pre.appendChild(button);
            });

            const STORAGE_KEY = 'javaConceptsSidebar';
            const groups = document.querySelectorAll('.block-group');
            const savedState = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');

            function setGroupState(blockName, expanded) {
                const group = document.querySelector(`.block-group[data-block="${blockName}"]`);
                if (!group) return;
                const content = group.querySelector('.block-content');
                const chevron = group.querySelector('.chevron');
                if (expanded) {
                    content.classList.remove('hidden');
                    chevron.classList.add('rotate-180');
                } else {
                    content.classList.add('hidden');
                    chevron.classList.remove('rotate-180');
                }
            }

            function saveState() {
                const state = {};
                groups.forEach(group => {
                    const blockName = group.dataset.block;
                    const expanded = !group.querySelector('.block-content').classList.contains('hidden');
                    state[blockName] = expanded;
                });
                localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
            }

            groups.forEach(group => {
                const toggle = group.querySelector('.block-toggle');
                const content = group.querySelector('.block-content');
                toggle.addEventListener('click', () => {
                    content.classList.toggle('hidden');
                    toggle.querySelector('.chevron').classList.toggle('rotate-180');
                    saveState();
                });
            });

            document.getElementById('expand-all').addEventListener('click', () => {
                groups.forEach(group => setGroupState(group.dataset.block, true));
                saveState();
            });

            document.getElementById('collapse-all').addEventListener('click', () => {
                groups.forEach(group => setGroupState(group.dataset.block, false));
                saveState();
            });

            // Detectar categoría activa según la URL actual
            const currentPath = window.location.pathname;
            let activeBlock = null;
            document.querySelectorAll('.sidebar-link').forEach(link => {
                const linkPath = new URL(link.href).pathname;
                if (linkPath === currentPath) {
                    link.classList.add('bg-slate-800', 'text-white');
                    activeBlock = link.closest('.block-group')?.dataset.block;
                }
            });

            // Aplicar estado guardado o, si no hay, expandir solo la categoría activa
            const hasSavedState = Object.keys(savedState).length > 0;
            groups.forEach(group => {
                const blockName = group.dataset.block;
                if (hasSavedState) {
                    setGroupState(blockName, savedState[blockName] === true);
                } else {
                    setGroupState(blockName, blockName === activeBlock);
                }
            });

            // Tema oscuro/claro
            const THEME_KEY = 'javaConceptsTheme';
            const html = document.documentElement;
            const themeToggle = document.getElementById('theme-toggle');
            const sunIcon = document.getElementById('theme-icon-sun');
            const moonIcon = document.getElementById('theme-icon-moon');

            function applyTheme(dark) {
                if (dark) {
                    html.classList.add('dark');
                    sunIcon.classList.remove('hidden');
                    moonIcon.classList.add('hidden');
                } else {
                    html.classList.remove('dark');
                    sunIcon.classList.add('hidden');
                    moonIcon.classList.remove('hidden');
                }
            }

            const savedTheme = localStorage.getItem(THEME_KEY);
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            applyTheme(savedTheme === 'dark' || (savedTheme === null && prefersDark));

            themeToggle.addEventListener('click', () => {
                const isDark = html.classList.contains('dark');
                applyTheme(!isDark);
                localStorage.setItem(THEME_KEY, !isDark ? 'dark' : 'light');
            });
        });
    </script>
</body>
</html>
