# Perfil Neon: PostgreSQL en la nube
# Actívalo con: --spring.profiles.active=neon
# Crea un fichero .env en la raíz del proyecto con:
#   NEON_URL=jdbc:postgresql://HOST:5432/neondb?sslmode=require&channel_binding=require
#   NEON_USER=neondb_owner
#   NEON_PASSWORD=tu_password

server.port=${PORT:8080}

spring.datasource.url=${NEON_URL}
spring.datasource.username=${NEON_USER}
spring.datasource.password=${NEON_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.hbm2ddl.auto=update
spring.jpa.defer-datasource-initialization=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Batch inserts para acelerar DataLoader
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

# Consola H2 solo en dev local (no en neon)
spring.h2.console.enabled=false
