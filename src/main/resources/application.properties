spring.application.name=java-concepts-doc

# Perfil por defecto: H2 en memoria para desarrollo local
spring.datasource.url=jdbc:h2:mem:java_concepts;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Consola H2 útil para debug (solo perfil default)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Thymeleaf cache desactivado en local
spring.thymeleaf.cache=false
